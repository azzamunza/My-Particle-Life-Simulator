<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle Life Simulator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #ui {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <select id="mode-select" style="
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      padding: 6px 12px;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      cursor: pointer;
    ">
      <option value="particleLife">🔵 Particle Life</option>
      <option value="cellSim">🧬 Cell Biology</option>
    </select>
    <canvas id="canvas"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
